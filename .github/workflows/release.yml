name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = python -c "from version import APP_VERSION; print(APP_VERSION)"
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Extract release notes
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          @'
from pathlib import Path
import re
import sys

version = sys.argv[1]
changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
pattern = rf"(?ms)^##\s+{re.escape(version)}\b.*?\n(.*?)(?=^##\s+|\Z)"
match = re.search(pattern, changelog)
if not match:
    raise SystemExit(f"Could not find changelog entry for {version}")
Path("release_notes.md").write_text(match.group(1).strip() + "\n", encoding="utf-8")
'@ | python - $version

      - name: Build executable
        shell: pwsh
        run: |
          $env:PYGAME_HIDE_SUPPORT_PROMPT = "1"
          python -m PyInstaller --noconfirm --clean --onefile --windowed --name Bucklespring --icon bucklespring.ico --version-file .\file_version_info.txt --distpath . --workpath build --specpath . --add-data "audios;audios" --add-data "bucklespring.ico;." --hidden-import pystray._win32 --exclude-module pygame.tests --exclude-module pygame.examples .\bucklespring.py

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bucklespring-${{ steps.version.outputs.version }}
          path: Bucklespring.exe
          if-no-files-found: error

      - name: Ensure version tag exists on HEAD
        shell: pwsh
        run: |
          git fetch --tags --force
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          $version = "${{ steps.version.outputs.version }}"
          $headCommit = (git rev-parse HEAD).Trim()
          $tagCommit = (git rev-list -n 1 $version 2>$null)
          if ([string]::IsNullOrWhiteSpace($tagCommit)) {
            git tag -a $version -m "Release $version"
            git push origin $version
            Write-Host "Created and pushed tag $version."
          } elseif ($tagCommit.Trim() -ne $headCommit) {
            throw "Tag $version already exists on $($tagCommit.Trim()) instead of HEAD $headCommit."
          } else {
            Write-Host "Tag $version already points to HEAD."
          }

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body_path: release_notes.md
          files: Bucklespring.exe
          fail_on_unmatched_files: true
