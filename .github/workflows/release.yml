name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = python -c "from version import APP_VERSION; print(APP_VERSION)"
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build executable
        shell: pwsh
        run: |
          $env:PYGAME_HIDE_SUPPORT_PROMPT = "1"
          pyinstaller --noconfirm --clean --onefile --windowed --name Bucklespring --icon bucklespring.ico --version-file .\file_version_info.txt --distpath . --workpath build --specpath . --add-data "audios;audios" --add-data "bucklespring.ico;." --hidden-import pystray._win32 --exclude-module pygame.tests --exclude-module pygame.examples .\bucklespring.py

      - name: Create and push tag
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          $version = "${{ steps.version.outputs.version }}"
          $existing = git tag --list $version
          if (-not $existing) {
            git tag $version
            git push origin $version
          } else {
            Write-Host "Tag $version already exists."
          }

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          gh release view $version *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $version .\Bucklespring.exe --clobber
          } else {
            gh release create $version .\Bucklespring.exe --title $version --notes "Automated release for $version"
          }
